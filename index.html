<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Oddiy Clock + Timer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Fullscreen tugma -->
  <button class="fs-btn" id="fsBtn">⤢ Fullscreen</button>

  <!-- SOAT -->
  <div class="soat">
    <span id="soat">00</span>:<span id="minut">00</span>:<span id="sekund">00</span>
  </div>

  <!-- Timezone -->
  <div class="tz">
    <select id="tzSelect">
      <option value="local">Local</option>
      <option value="Asia/Tashkent">Tashkent</option>
      <option value="Europe/London">London</option>
    </select>
  </div>

  <!-- TAYMER -->
  <div class="timer">
    <h3>Timer</h3>
    <div class="timer-display" id="timerDisplay">05:00</div>
    <div>
      <input type="number" id="minInput" placeholder="min" value="5" min="0">
      <input type="number" id="secInput" placeholder="sec" value="0" min="0" max="59">
    </div>
    <div>
      <button id="startBtn">Start</button>
      <button id="resetBtn">Reset</button>
    </div>
  </div>

  <!-- ALERT -->
  <div class="alert" id="alertBox">
    <div class="alert-text">It's time to rest<img src="Open Door.gif" alt="Rest Icon"></div>
    <p>Take a deep breath</p>
  </div>

  <script src="script.js"></script>
</body>
</html>
